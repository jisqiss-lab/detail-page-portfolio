<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Standard · Detail Page Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pretendard:wght@400;500;600;700;800;900&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    font-family:'Pretendard',-apple-system,sans-serif;
    background:#1a1a1a;color:#222;
    -webkit-font-smoothing:antialiased;
  }
  a{text-decoration:none;color:inherit;}

  .page{
    max-width:1400px;width:100%;margin:0 auto;background:#fff;
    box-shadow:0 0 60px rgba(0,0,0,0.15);
  }

  /* ──────── 상단바 ──────── */
  .top-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:28px 60px;
    background:#0e0e0e;color:#fff;
  }
  .top-bar .brand{
    font-family:'Cormorant Garamond',serif;
    font-size:20px;font-weight:500;letter-spacing:0.5px;
  }
  .top-bar .brand em{font-style:italic;color:#C9A36B;}
  .top-bar .back{
    width:40px;height:40px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.2);
    display:flex;align-items:center;justify-content:center;
    color:#aaa;font-size:18px;line-height:1;
    transition:border-color 0.3s ease,color 0.3s ease,background 0.3s ease;
  }
  .top-bar .back:hover{
    border-color:rgba(255,255,255,0.6);
    color:#fff;background:rgba(255,255,255,0.08);
  }

  /* ──────── 인트로 ──────── */
  .intro{padding:80px 80px 60px;text-align:center;}
  .intro .eyebrow{
    display:inline-flex;align-items:center;gap:14px;
    font-size:11px;letter-spacing:5px;
    color:#666;font-weight:700;text-transform:uppercase;
    margin-bottom:18px;
  }
  .intro .eyebrow::before,
  .intro .eyebrow::after{content:'';width:36px;height:1px;background:#bbb;}
  .intro h1{
    font-family:'Cormorant Garamond',serif;
    font-size:84px;font-weight:400;letter-spacing:-1px;
    line-height:1;color:#1a1a1a;margin-bottom:14px;
  }
  .intro h1 em{font-style:italic;font-weight:500;color:#888;}
  .intro p{font-size:14px;color:#666;letter-spacing:0.4px;line-height:1.7;}

  /* ──────── 섹션 ──────── */
  .section{
    --bg:#f5f5f5;--text:#1a1a1a;--sub:#555;--accent:#888;
    background:var(--bg);color:var(--text);
    padding:64px 50px 80px;
  }
  .corner-label{
    display:flex;justify-content:space-between;align-items:center;
    font-size:10px;letter-spacing:3px;font-weight:700;
    color:var(--sub);text-transform:uppercase;
    margin-bottom:28px;
  }
  .corner-label .num{
    font-family:'Cormorant Garamond',serif;
    font-size:14px;letter-spacing:2px;
  }

  /* ──────── 제품 헤더 + 카드 ──────── */
  .product-header{margin-bottom:28px;}
  .brand-title{
    font-family:'Cormorant Garamond',serif;
    font-size:68px;font-weight:400;
    letter-spacing:-1px;line-height:1;
    color:var(--text);margin-bottom:10px;
  }
  .product-name{
    font-size:18px;font-weight:600;
    color:var(--sub);letter-spacing:0.2px;
  }

  .page-card{
    width:100%;overflow:hidden;
    border-radius:10px;
    box-shadow:0 32px 80px rgba(0,0,0,0.18);
    line-height:0;
    opacity:0;transform:translateY(48px);
    transition:opacity 1s cubic-bezier(0.22,1,0.36,1) 0.1s,
               transform 1s cubic-bezier(0.22,1,0.36,1) 0.1s;
    will-change:transform,opacity;
  }
  .page-card img{width:100%;display:block;}
  .section.is-visible .page-card{opacity:1;transform:translateY(0);}

  .product-header{
    opacity:0;transform:translateY(24px);
    transition:opacity 0.7s ease,transform 0.7s ease;
  }
  .section.is-visible .product-header{opacity:1;transform:translateY(0);}

  /* ── 섹션 · Pebble ── */
  .section.s-pebble{
    --bg:linear-gradient(135deg,#EEEFE9 0%,#C9CCBE 100%);
    --text:#2A2F22;--sub:#5C6450;--accent:#6B7355;
  }

  /* 푸터 */
  .outro{
    padding:60px 80px 80px;text-align:center;
    background:#1a1a1a;color:#fff;
  }
  .outro h2{
    font-family:'Cormorant Garamond',serif;
    font-size:52px;font-weight:400;font-style:italic;
    letter-spacing:-1px;margin-bottom:10px;
  }
  .outro h2 em{color:#C9A36B;}
  .outro p{
    font-size:11px;color:#888;letter-spacing:3px;
    text-transform:uppercase;font-weight:600;
    margin-bottom:28px;
  }
  .outro .home-link{
    display:inline-block;
    font-size:11px;letter-spacing:3px;color:#C9A36B;
    font-weight:700;text-transform:uppercase;
    padding:14px 32px;
    border:1px solid rgba(201,163,107,0.4);
    border-radius:999px;
    transition:all 0.3s ease;
  }
  .outro .home-link:hover{background:#C9A36B;color:#1a1a1a;}

  /* ──────── 반응형 ──────── */
  @media (max-width:768px){
    .top-bar{padding:18px 20px;}
    .intro{padding:48px 20px 32px;}
    .intro h1{font-size:52px;}
    .intro p{font-size:13px;}
    .section{padding:40px 16px 56px;}
    .corner-label{font-size:9px;letter-spacing:2px;margin-bottom:20px;}
    .brand-title{font-size:44px;}
    .product-name{font-size:15px;}
    .product-header{margin-bottom:20px;}
    .page-card{border-radius:6px;}
    .outro{padding:48px 24px 56px;}
    .outro h2{font-size:36px;}
  }
</style>
</head>
<body>

<div class="page">

  <!-- 상단바 -->
  <div class="top-bar">
    <div class="brand">Detail <em>Page</em> Studio</div>
    <a href="index.html" class="back">←</a>
  </div>

  <!-- 인트로 -->
  <div class="intro">
    <div class="eyebrow">— Tier 01 · Standard —</div>
    <h1>The <em>Standard</em></h1>
    <p>깔끔한 기본 디자인 · 정돈된 구성과 단정한 타이포로 제품의 본질을 전달합니다.<br>· 표준 섹션 구성 · 제품컷 중심 레이아웃 · 가벼운 제작 단가 ·</p>
  </div>

  <!-- 섹션 · 페블 캠핑 의자 -->
  <section class="section s-pebble">
    <div class="corner-label">
      <span>Pebble · 850 Pack Chair</span>
      <span class="num">No. 01 / 01</span>
    </div>
    <div class="product-header">
      <h2 class="brand-title">Pebble</h2>
      <p class="product-name">초경량 패킹 체어 · 850g</p>
    </div>
    <div class="page-card">
      <img src="페블 캠핑 의자.png" alt="페블 850 Pack Chair 상세페이지">
    </div>
  </section>

  <!-- 푸터 -->
  <div class="outro">
    <h2>Want a <em>customized</em> look?</h2>
    <p>Deluxe & Premium — also available</p>
    <a href="index.html" class="home-link">← Back to Tiers</a>
  </div>

</div>

<script>
const observer = new IntersectionObserver(
  entries => entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('is-visible'); observer.unobserve(e.target); }
  }),
  { rootMargin:'0px 0px -60px 0px', threshold:0 }
);
document.querySelectorAll('.section').forEach(s => observer.observe(s));
</script>

</body>
</html>
